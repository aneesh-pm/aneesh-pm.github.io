		<div id="fh5co-contact-section">
			<div class="container">

						<h3>Our Address</h3>
						<ul class="contact-info">
							<li><i class="icon-location-pin"></i>Ernakulam,Kerala,India</li>
							<li><i class="icon-phone2"></i>+ 1234 5678 99</li>
							<li><i class="icon-mail"></i><a href="#">abbb@mail.com</a></li>

					</div>
					<div class="col-md-8 animate-box">
						<div class="row">
							<form id="contactForm" data-toggle="validator" data-focus="false">
								<div class="col-md-6">
									<div class="form-group">
										<input type="text" class="form-control" placeholder="Name" id="cname" required>
										<label class="label-control" for="cname"></label>
										<div class="help-block with-errors"></div>
									</div>
								</div>
								<div class="col-md-6">
									<div class="form-group">
										<input type="email" class="form-control" placeholder="Email" id="cemail"
											required>
										<label class="label-control" for="cemail"></label>
										<div class="help-block with-errors"></div>
									</div>
								</div>
								<div class="col-md-12">
									<div class="form-group">
										<textarea class="form-control" placeholder="Message" cols="30" rows="7"
											id="cmessage" required></textarea>
										<label class="label-control" for="cmessage"></label>
										<div class="help-block with-errors"></div>
									</div>
								</div>
								<div class="col-md-12">
									<div class="form-group">
										<input type="submit" value="Send Message" class="btn btn-primary">
									</div>
									<div class="form-message">
										<div id="cmsgSubmit" class="h4 text-center hidden"></div>
									</div>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
